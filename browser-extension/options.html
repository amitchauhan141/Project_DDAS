<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DDAS Extension Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="card">
      <h1>DDAS Download Sync</h1>
      <p>Configure DDAS API access for automatic browser download ingestion.</p>

      <label for="apiBaseUrl">DDAS API Base URL</label>
      <input id="apiBaseUrl" placeholder="http://localhost:4000/api" />

      <label for="jwtToken">JWT Token</label>
      <textarea id="jwtToken" rows="5" placeholder="Paste token from DDAS login response"></textarea>

      <button id="saveBtn">Save Configuration</button>
      <p id="status"></p>
    </main>

    <script src="options.js" type="module"></script>
  </body>
</html>
